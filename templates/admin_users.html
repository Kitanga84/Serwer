{% extends "base.html" %}

{% block content %}
<h2>Benutzerverwaltung</h2>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Benutzername</th>
            <th>Typ</th>
            <th>Aktion</th>
        </tr>
    </thead>
    <tbody>
        {% for username, data in users.items() %}
        <tr>
            <td>{{ username }}</td>
            <td>{{ "Admin" if data.is_admin else "Benutzer" }}</td>
            <td>
                {% if not data.is_admin %}
                <a href="{{ url_for('delete_user', username_to_delete=username) }}" class="btn btn-sm btn-danger">Löschen</a>
                {% else %}
                <span class="text-muted">Nicht löschbar</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
